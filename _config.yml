collections:
  projectlinks:
    output: false
    permalink: ''
  projects:
    output: true
    permalink: /:collection/:title
  articles:
    output: true
    permalink: /:collection/:title


defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"
  - scope:
      path: ""
    values:
      layout: "default"